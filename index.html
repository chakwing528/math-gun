<div id="start-menu-content" style="display:flex; flex-direction:row; align-items:center; justify-content:center; gap:60px;">
                
                <div style="background: rgba(30, 41, 59, 0.85); padding: 35px 40px; border-radius: 16px; border: 2px solid #475569; display: flex; flex-direction: column; align-items: center; box-shadow: 0 0 25px rgba(0,0,0,0.6);">
                    <h2 style="color: #fbbf24; margin: 0 0 25px 0; font-size: 26px; text-shadow: 1px 1px 3px #000;">⌨️ 遊戲操作指引</h2>
                    <div style="display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 30px;">
                        <div class="key">W</div>
                        <div style="display: flex; gap: 8px;">
                            <div class="key">A</div>
                            <div class="key">S</div>
                            <div class="key">D</div>
                        </div>
                    </div>
                    <div style="text-align: center; color: #e2e8f0; font-size: 18px; line-height: 1.8;">
                        <span style="color:#fbbf24; font-weight:bold;">W</span> : 前進 &nbsp;&nbsp;&nbsp; <span style="color:#fbbf24; font-weight:bold;">S</span> : 後退<br>
                        <span style="color:#fbbf24; font-weight:bold;">A</span> : 向左 &nbsp;&nbsp;&nbsp; <span style="color:#fbbf24; font-weight:bold;">D</span> : 向右<br><br>
                        <span style="color:#38bdf8; font-weight:bold;">🖱️ 滑鼠</span> : 游標瞄準方向<br>
                        <span style="color:#ef4444; font-weight:bold;">🔘 左鍵</span> : 按住即可射擊
                    </div>
                </div>

                <div id="right-panel" style="display:flex; flex-direction:column; align-items:center; gap:12px;">
                    
                    <div id="login-selection" style="display:flex; flex-direction:column; align-items:center; gap:15px; width: 100%;">
                        <h1 style="color: #fbbf24; font-size: 35px; margin-bottom: 15px; text-shadow: 2px 2px 4px #000; text-align: center;">請先輸入資料</h1>
                        <input type="text" id="login-class" placeholder="班別 (例: 1A) *必填" style="width: 280px; padding: 12px; border-radius: 8px; font-size: 18px; text-align: center; border: 2px solid #94a3b8; background: #334155; color: white; box-sizing: border-box;">
                        <input type="text" id="login-sid" placeholder="學號 (例: 01) *必填" style="width: 280px; padding: 12px; border-radius: 8px; font-size: 18px; text-align: center; border: 2px solid #94a3b8; background: #334155; color: white; box-sizing: border-box;">
                        <button class="diff-btn" style="margin-top: 10px;" onclick="window.goToDifficulty()">下一步</button>
                    </div>

                    <div id="diff-selection" style="display:none; flex-direction:column; align-items:center; gap:12px;">
                        <h1 style="color: #fbbf24; font-size: 35px; margin-bottom: 15px; text-shadow: 2px 2px 4px #000; text-align: center;">請選擇目標程度</h1>
                        <button class="diff-btn" onclick="window.startGame('1')">程度 1<span style="font-size: 14px; font-weight: normal; display: block; margin-top: 4px; color: #e2e8f0;">10-50 整數加減運算<br><span style="color:#fbbf24; font-weight:bold;">(分數 x1.0)</span></span></button>
                        <button class="diff-btn" onclick="window.startGame('2')">程度 2<span style="font-size: 14px; font-weight: normal; display: block; margin-top: 4px; color: #e2e8f0;">整數四則混合運算<br><span style="color:#fbbf24; font-weight:bold;">(分數 x1.2)</span></span></button>
                        <button class="diff-btn" onclick="window.startGame('3')">程度 3<span style="font-size: 14px; font-weight: normal; display: block; margin-top: 4px; color: #e2e8f0;">加減混合 及 基礎指數<br><span style="color:#fbbf24; font-weight:bold;">(分數 x1.4)</span></span></button>
                        <button class="diff-btn" onclick="window.startGame('4')">程度 4<span style="font-size: 14px; font-weight: normal; display: block; margin-top: 4px; color: #e2e8f0;">捨入/展開/因式/指數 (基礎)<br><span style="color:#fbbf24; font-weight:bold;">(分數 x1.6)</span></span></button>
                        <button class="diff-btn" onclick="window.startGame('5')">程度 5<span style="font-size: 14px; font-weight: normal; display: block; margin-top: 4px; color: #e2e8f0;">捨入/展開/因式/指數 (進階)<br><span style="color:#fbbf24; font-weight:bold;">(分數 x1.8)</span></span></button>
                        <button class="diff-btn" style="background: #64748b; margin-top: 10px; font-size: 18px; padding: 10px;" onclick="window.backToLogin()">返回修改資料</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="submit-form">
            <h3 style="margin: 0 0 5px 0; color: #fbbf24; font-size: 24px;">遊戲結束</h3>
            <p style="color: #cbd5e1; font-size: 14px; margin: 0 0 15px 0; text-align: center;">請點擊下方按鈕上傳您的成績<br>(上傳完成後點擊畫面任意處即可重玩)</p>
            <button onclick="window.submitScore()" style="padding: 15px; font-size: 18px;">上傳成績並觀看排名</button>
        </div>

        <div id="version-tag">Math Survival V88</div>
