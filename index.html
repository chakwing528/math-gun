<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Survival - V40</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        /* ================= 整合所有 CSS 確保 100% 載入 ================= */
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #d2b48c; /* 經典沙漠地牢底色 */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none; -webkit-user-select: none; touch-action: none;
        }
        #gameCanvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; color: #fbbf24; display: flex;
            align-items: center; justify-content: center; z-index: 9999;
            font-family: Arial, sans-serif; font-size: 24px; font-weight: bold;
        }

        #start-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.95); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 500; gap: 20px;
        }
        .diff-btn {
            background: #3b82f6; color: white; border: 2px solid #94a3b8; padding: 15px 40px;
            font-size: 24px; font-weight: bold; border-radius: 10px; cursor: pointer; width: 250px;
            transition: background 0.2s;
        }
        .diff-btn:hover { background: #2563eb; }

        #math-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 600; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .math-container {
            background: #1e293b; padding: 30px; border-radius: 12px;
            border: 4px solid #38bdf8; width: 85%; max-width: 600px; max-height: 90%; overflow-y: auto;
            text-align: center; color: white; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #math-timer-bg { width: 100%; height: 12px; background: #334155; margin-bottom: 20px; border-radius: 6px; overflow: hidden;}
        #math-timer-bar { height: 100%; background: #4ade80; width: 100%; transition: width 0.1s linear, background-color 0.3s; }
        #math-question-content { font-size: 20px; margin-bottom: 25px; overflow-x: auto; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px;}
        .mcq-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .mcq-btn {
            background: #334155; border: 2px solid #64748b; padding: 15px;
            border-radius: 8px; color: white; font-size: 20px; cursor: pointer;
            transition: 0.2s; display: flex; align-items: center; justify-content: flex-start; gap: 15px;
        }
        .mcq-btn:hover { background: #475569; border-color: #fbbf24; }
        .mcq-label { color: #fbbf24; font-weight: bold; font-size: 24px; }

        #ui-container {
            position: absolute; top: 10px; left: 10px; bottom: 10px; width: 180px; 
            display: flex; flex-direction: column; gap: 8px; z-index: 10; pointer-events: none;
        }
        .ui-box { background: rgba(241, 245, 249, 0.4); border: 2px solid rgba(148, 163, 184, 0.5); border-radius: 6px; padding: 8px; pointer-events: auto; }
        .player-info-wrapper { display: flex; align-items: center; gap: 8px; }
        #hp-bar-bg { width: 100%; height: 10px; background: #cbd5e1; border: 2px solid #475569; margin-bottom: 4px; }
        #ui-hp-fill { height: 100%; background: #22c55e; width: 100%; }
        .black-text { color: #000000; font-weight: bold; font-size: 11px; line-height: 1.3; }
        .monster-row { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
        .monster-count { color: #000000; font-weight: bold; font-size: 13px; }

        #leaderboard-box { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #leaderboard-box h3 { margin: 0 0 8px 0; color: #000; text-align: center; font-size: 13px; }
        #leaderboard-list { margin: 0; padding-left: 20px; color: #000; font-weight: bold; font-size: 11px; overflow-y: auto; max-height: 350px; }
        #leaderboard-list li { margin-bottom: 4px; padding: 2px 4px; }
        #submit-form { display: none; flex-direction: column; align-items: center; gap: 6px; margin-top: 8px; }
        #submit-form input { width: 90%; padding: 4px; border-radius: 4px; border: 1px solid #ccc; text-align: center; font-size: 11px; }
        #submit-form button { background: #3b82f6; color: white; border: none; padding: 6px; border-radius: 4px; cursor: pointer; width: 90%; font-weight: bold; font-size: 11px;}
    </style>
</head>
<body>

    <!-- 外部題庫 -->
    <script src="js/topics/indices.js"></script>

    <!-- 音效資源 -->
    <audio id="bgm" src="audio/bgm.mp3" loop preload="auto"></audio>
    <audio id="shootSfx" src="audio/shootsSfx.m4a" preload="auto"></audio>
    <audio id="reloadSfx" src="audio/reloadSfx.m4a" preload="auto"></audio>
    <audio id="emptyAmmoSfx" src="audio/emptyAmmoSfx.m4a" preload="auto"></audio>

    <div id="loading-screen">連接伺服器中，請稍候...</div>
    
    <div id="start-menu">
        <h1 style="color: #fbbf24; font-size: 40px; margin-bottom: 30px; text-shadow: 2px 2px 4px #000; text-align: center;">請選擇目標等級</h1>
        <button class="diff-btn" onclick="startGame('S1')">S1 程度</button>
        <button class="diff-btn" onclick="startGame('S2')">S2 程度</button>
        <button class="diff-btn" onclick="startGame('S3')">S3 程度</button>
    </div>

    <div id="math-overlay">
        <div id="math-container" class="math-container">
            <h2 id="math-header" style="margin-top: 0;"></h2>
            <div id="math-timer-bg"><div id="math-timer-bar"></div></div>
            <div id="math-question-content"></div>
            <div class="mcq-options" id="math-options-container"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-container">
        <div class="ui-box">
            <div class="player-info-wrapper">
                <canvas id="player-icon" width="45" height="45"></canvas>
                <div style="flex:1;">
                    <div id="hp-bar-bg"><div id="ui-hp-fill"></div></div>
                    <div class="black-text" id="ui-hp-text">HP: 100</div>
                    <div class="black-text" id="ui-wep-name">武裝: 尚未裝備</div>
                    <div class="black-text" id="ui-ammo-text">彈藥: 0/0</div>
                </div>
            </div>
        </div>

        <div class="ui-box">
            <div style="text-align:center; color:#000; font-weight:bold; font-size:12px; margin-bottom:5px;">剩餘魔物目標</div>
            <div class="monster-row"><canvas id="m-icon-1" width="24" height="24"></canvas><span class="monster-count" id="m-count-1">x 0</span></div>
            <div class="monster-row"><canvas id="m-icon-2" width="24" height="24"></canvas><span class="monster-count" id="m-count-2">x 0</span></div>
            <div class="monster-row"><canvas id="m-icon-3" width="24" height="24"></canvas><span class="monster-count" id="m-count-3">x 0</span></div>
            <div class="monster-row"><canvas id="m-icon-4" width="24" height="24"></canvas><span class="monster-count" id="m-count-4">x 0</span></div>
            <div class="monster-row"><canvas id="m-icon-5" width="24" height="24"></canvas><span class="monster-count" id="m-count-5">x 0</span></div>
        </div>

        <div class="ui-box" id="leaderboard-box">
            <h3>🏆 總排行榜 🏆</h3>
            <ol id="leaderboard-list"><li>載入中...</li></ol>
            <div id="submit-form">
                <input type="text" id="lb-class" placeholder="班別">
                <input type="text" id="lb-sid" placeholder="學號">
                <input type="text" id="lb-name" placeholder="名字">
                <div style="display: flex; gap: 5px; width: 90%; justify-content: center; margin-top: 5px;">
                    <button onclick="submitScore()" style="flex: 1;">上傳</button>
                    <button onclick="showStartMenu()" style="flex: 1; background: #64748b;">重玩</button>
                </div>
            </div>
        </div>

        <div style="color: rgba(255, 255, 255, 0.5); font-weight: bold; font-size: 14px; margin-top: auto; padding-left: 5px;">V40</div>
    </div>

<script>
// ============================================================================
// 🎮 V40 終極穩定單檔版 - 保證不卡死，並完全還原精美畫風！
// ============================================================================

// 🌐 API 設定
const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyhAYaMKRTbD_VyHDe-MZZ5OBZVdsvY2l9qcKWq8TuliBKptbhLpQsHbc4wdyKmX24Cvg/exec"; 
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- 系統變數 ---
let gameState = 'START_MENU'; 
let globalTime = 0; let shakeTime = 0; let bossAlarmTimer = 0;
let mathTimer = 0; let currentMathType = ''; let scoreSubmitted = false;
let currentDifficulty = 'S1';
let questionBank = [];
let audioInitialized = false;

const UI_BOUND = 200; 
let leftJoyBase = { x: UI_BOUND + 60, y: 120 }; 
let leftJoy = { active: false, id: null, stick: {x:0, y:0}, dir: {x:0, y:0} };
let rightJoy = { active: false, id: null, base: {x:0,y:0}, stick: {x:0,y:0}, dir: {x:0,y:0}, angle: 0 };
const joyRadius = 50;

const keys = { w: false, a: false, s: false, d: false };
let mouseX = window.innerWidth / 2; let mouseY = window.innerHeight / 2;
let isShooting = false;

// --- 視窗調整 ---
function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    leftJoyBase = { x: UI_BOUND + 60, y: canvas.height - 100 };
    leftJoy.stick = { x: leftJoyBase.x, y: leftJoyBase.y };
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// --- 數據結構 ---
let enemiesKilled = 0; let totalMonstersSpawned = 0; let TOTAL_MONSTERS = 19; 
let monstersLeft = [0, 0, 0, 0, 0, 0]; 
let lootBoxSpawnInterval = 480; let ammoBoxSpawnInterval = 180; 

let MONSTER_BASE = [
    {tier: 1, name: "一級怪物", count: 5, hp: 8, speed: 0.5, size: 26, color: '#ef4444'},
    {tier: 2, name: "二級怪物", count: 5, hp: 25, speed: 0.8, size: 30, color: '#f97316'},
    {tier: 3, name: "三級怪物", count: 5, hp: 200, speed: 1.0, size: 40, color: '#eab308'},
    {tier: 4, name: "四級怪物", count: 3, hp: 500, speed: 1.2, size: 50, color: '#84cc16'},
    {tier: 5, name: "五級首領", count: 1, hp: 1500, speed: 1.5, size: 80, color: '#a855f7'}
];

const WEAPONS = [
    { level: 1, name: "Lv.1 基礎手槍", damage: 1, bullets: 1, fireRate: 15, playerSpeed: 4, reloadAmmo: 30, magCapacity: 30, color: '#fde047', glow: '#ca8a04', recoil: 4, speed: 12 },
    { level: 2, name: "Lv.2 雙發衝鋒", damage: 1.5, bullets: 2, fireRate: 12, playerSpeed: 5, reloadAmmo: 30, magCapacity: 30, color: '#60a5fa', glow: '#2563eb', recoil: 5, speed: 14 },
    { level: 3, name: "Lv.3 散彈速射", damage: 2.25, bullets: 3, fireRate: 10, playerSpeed: 6, reloadAmmo: 40, magCapacity: 30, color: '#34d399', glow: '#059669', recoil: 6, speed: 16 },
    { level: 4, name: "Lv.4 脈衝步槍", damage: 3.4, bullets: 4, fireRate: 8, playerSpeed: 7, reloadAmmo: 40, magCapacity: 30, color: '#f472b6', glow: '#db2777', recoil: 7, speed: 18 },
    { level: 5, name: "Lv.5 穿甲重砲", damage: 5.1, bullets: 1, fireRate: 6, playerSpeed: 8, reloadAmmo: 50, magCapacity: 30, color: '#a78bfa', glow: '#7c3aed', recoil: 8, speed: 20, penetrate: true },
    { level: 6, name: "Lv.6 散射激光", damage: 7.6, bullets: 5, fireRate: 4, playerSpeed: 9, reloadAmmo: 50, magCapacity: 30, color: '#fb923c', glow: '#ea580c', recoil: 10, speed: 22 },
    { level: 7, name: "Lv.7 電漿風暴", damage: 11.4, bullets: 3, fireRate: 3, playerSpeed: 10, reloadAmmo: 60, magCapacity: 30, color: '#38bdf8', glow: '#0284c7', recoil: 12, speed: 25, penetrate: true },
    { level: 8, name: "Lv.8 終極殲滅", damage: 17.1, bullets: 7, fireRate: 2, playerSpeed: 10, reloadAmmo: 60, magCapacity: 30, color: '#ffffff', glow: '#fef08a', recoil: 14, speed: 28, penetrate: true },
    { level: 9, name: "Lv.MAX 神話武器", damage: 25.6, bullets: 9, fireRate: 1, playerSpeed: 10, reloadAmmo: 100, magCapacity: 30, color: '#ef4444', glow: '#b91c1c', recoil: 16, speed: 30, penetrate: true }
];

let player = {
    x: UI_BOUND + 100, y: canvas.height/2, radius: 20, color: '#3b82f6', speed: 4, hp: 100, maxHp: 100,
    weaponLevel: -1, currentMagazine: 0, totalAmmo: 0,       
    isReloading: false, reloadTimer: 0, angle: 0, recoilOffset: 0, lastFireTime: 0, isMoving: false
};

let bullets = []; let enemies = []; let lootBoxes = []; let ammoBoxes = []; let particles = []; let floatingTexts = []; let monsterQueue = [];

// ==========================================
// 🛠️ 輔助與 UI 功能
// ==========================================

function initAudio() {
    if (!audioInitialized) {
        let bgm = document.getElementById('bgm');
        if(bgm) { bgm.volume = 0.4; bgm.play().catch(()=>{}); }
        audioInitialized = true;
    }
}

// 網頁失去焦點時自動靜音
document.addEventListener('visibilitychange', () => {
    let bgm = document.getElementById('bgm');
    if (!bgm) return;
    if (document.hidden) bgm.pause();
    else if (audioInitialized && (gameState === 'PLAYING' || gameState === 'START_MENU')) bgm.play().catch(()=>{});
});

function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min)) + min; }
function shuffleArray(array) { 
    let arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) { 
        const j = Math.floor(Math.random() * (i + 1)); 
        [arr[i], arr[j]] = [arr[j], arr[i]]; 
    } 
    return arr; 
}

function updateHTMLHUD() {
    let hpFill = document.getElementById('ui-hp-fill');
    if (!hpFill) return; 

    hpFill.style.width = (Math.max(0, player.hp) / player.maxHp * 100) + '%';
    document.getElementById('ui-hp-text').textContent = `HP: ${Math.max(0, player.hp)}`;
    
    if (player.weaponLevel >= 0) {
        document.getElementById('ui-wep-name').textContent = `武裝: ${WEAPONS[player.weaponLevel].name}`;
        document.getElementById('ui-ammo-text').textContent = player.isReloading ? `換彈中...` : `彈藥: ${player.currentMagazine}/${player.totalAmmo}`;
    } else {
        document.getElementById('ui-wep-name').textContent = `武裝: 尚未裝備`;
        document.getElementById('ui-ammo-text').textContent = `彈藥: 0/0`;
    }

    for(let i=1; i<=5; i++) {
        let el = document.getElementById(`m-count-${i}`);
        if(el) el.textContent = `x ${Math.max(0, monstersLeft[i])}`;
    }
}

function drawHUDIcons() {
    let pC = document.getElementById('player-icon'); 
    if(!pC) return;
    let pCtx = pC.getContext('2d');
    pCtx.translate(22.5, 26); pCtx.scale(0.75, 0.75); 
    pCtx.fillStyle = '#dc2626'; pCtx.beginPath(); pCtx.moveTo(-9, -7); pCtx.lineTo(-15, 15); pCtx.lineTo(15, 15); pCtx.lineTo(9, -7); pCtx.fill();
    pCtx.fillStyle = '#1d4ed8'; pCtx.fillRect(-9, -11, 18, 22); 
    pCtx.fillStyle = '#94a3b8'; pCtx.fillRect(-10, -11, 20, 12); 
    pCtx.fillStyle = '#fcd34d'; pCtx.beginPath(); pCtx.arc(0, -18, 12, 0, Math.PI*2); pCtx.fill();
    pCtx.fillStyle = '#cbd5e1'; pCtx.beginPath(); pCtx.arc(0, -21, 13, Math.PI, 0); pCtx.fill(); pCtx.fillRect(-13, -21, 26, 4); 
    pCtx.fillStyle = '#b91c1c'; pCtx.fillRect(-2, -36, 4, 9);
    pCtx.fillStyle = '#1e293b'; pCtx.beginPath(); pCtx.arc(-4, -17, 2, 0, Math.PI*2); pCtx.fill(); pCtx.beginPath(); pCtx.arc(4, -17, 2, 0, Math.PI*2); pCtx.fill();

    let mTypes = [{ tier: 1, color: '#ef4444' }, { tier: 2, color: '#f97316' }, { tier: 3, color: '#eab308' }, { tier: 4, color: '#84cc16' }, { tier: 5, color: '#a855f7' }];
    for (let i=0; i<5; i++) {
        let mC = document.getElementById(`m-icon-${i+1}`); 
        if(!mC) continue;
        let mCtx = mC.getContext('2d');
        mCtx.translate(12, 14); mCtx.scale(0.8, 0.8); 
        let eSize = 14; 
        mCtx.fillStyle = mTypes[i].color; mCtx.beginPath(); mCtx.arc(0, -eSize*0.4, eSize*0.45, Math.PI, 0); mCtx.lineTo(eSize*0.45, eSize*0.1); mCtx.lineTo(-eSize*0.45, eSize*0.1); mCtx.fill();
        if (mTypes[i].tier === 5) {
            mCtx.fillStyle = '#334155'; mCtx.beginPath(); mCtx.moveTo(-eSize*0.2, -eSize*0.4); mCtx.lineTo(-eSize*0.5, -eSize*0.7); mCtx.lineTo(-eSize*0.3, -eSize*0.3); mCtx.fill(); mCtx.beginPath(); mCtx.moveTo(eSize*0.2, -eSize*0.4); mCtx.lineTo(eSize*0.5, -eSize*0.7); mCtx.lineTo(eSize*0.3, -eSize*0.3); mCtx.fill();
            mCtx.fillStyle = '#fbbf24'; mCtx.beginPath(); mCtx.moveTo(-8, -eSize*0.4); mCtx.lineTo(-10, -eSize*0.6); mCtx.lineTo(0, -eSize*0.5); mCtx.lineTo(10, -eSize*0.6); mCtx.lineTo(8, -eSize*0.4); mCtx.fill();
        } else { mCtx.fillStyle = '#fca5a5'; mCtx.beginPath(); mCtx.arc(0, -2, eSize*0.2, 0, Math.PI * 2); mCtx.fill(); }
        mCtx.fillStyle = mTypes[i].tier >= 3 ? '#ef4444' : 'white'; mCtx.beginPath(); mCtx.arc(-2.5, -eSize*0.3, 1.5, 0, Math.PI*2); mCtx.fill(); mCtx.beginPath(); mCtx.arc(2.5, -eSize*0.3, 1.5, 0, Math.PI*2); mCtx.fill();
        mCtx.fillStyle = 'black'; mCtx.beginPath(); mCtx.arc(-2.5, -eSize*0.3, 1, 0, Math.PI*2); mCtx.fill(); mCtx.beginPath(); mCtx.arc(2.5, -eSize*0.3, 1, 0, Math.PI*2); mCtx.fill();
    }
}
setTimeout(drawHUDIcons, 100);

// ==========================================
// 🚀 遊戲狀態與連線邏輯
// ==========================================

function fetchLeaderboard() {
    if (!GAS_LEADERBOARD_URL) return;
    fetch(`${GAS_LEADERBOARD_URL}?action=getLeaderboard&t=${Date.now()}`)
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById('leaderboard-list');
            if(!list) return;
            list.innerHTML = "";
            if (!data || data.length === 0) { list.innerHTML = "<li>暫無數據</li>"; return; }
            data.forEach(item => {
                let li = document.createElement('li');
                let safeName = item.name.length > 6 ? item.name.substring(0, 6) + '..' : item.name;
                li.textContent = `${item.cls} ${safeName} - ${item.score}分 (${item.diff})`;
                if (item.isMe) { li.style.backgroundColor = "rgba(46, 204, 113, 0.4)"; li.style.borderRadius = "4px"; }
                list.appendChild(li);
            });
        }).catch(e => console.log("LB 獲取失敗"));
}

window.submitScore = function() {
    const cls = document.getElementById('lb-class').value.trim();
    const sid = document.getElementById('lb-sid').value.trim();
    const name = document.getElementById('lb-name').value.trim();
    if (!cls || !sid || !name) { alert("請填寫班別、學號及名字！"); return; }

    scoreSubmitted = true;
    document.getElementById('submit-form').style.display = 'none';
    document.getElementById('leaderboard-list').innerHTML = "<li>上傳中...</li>";

    const addUrl = `${GAS_WEB_APP_URL}?action=addScore&diff=${currentDifficulty}&cls=${cls}&sid=${sid}&name=${name}&score=${enemiesKilled}&t=${Date.now()}`;
    fetch(addUrl).then(()=>fetchLeaderboard()).catch(()=>{});
}

window.startGame = function(level) {
    initAudio();
    currentDifficulty = level;
    document.getElementById('start-menu').style.display = 'none';
    resetGame();
}

window.showStartMenu = function() {
    document.getElementById('submit-form').style.display = 'none';
    document.getElementById('start-menu').style.display = 'flex';
    gameState = 'START_MENU';
    ['lb-class', 'lb-sid', 'lb-name'].forEach(id => { let el=document.getElementById(id); if(el)el.value=''; });
}

function resetGame() {
    player.weaponLevel = -1; player.hp = 100; player.speed = 4; 
    player.currentMagazine = 0; player.totalAmmo = 0; player.isReloading = false; 
    
    enemiesKilled = 0; totalMonstersSpawned = 0;
    player.x = UI_BOUND + (canvas.width - UI_BOUND)/2; player.y = canvas.height / 2;
    bullets = []; enemies = []; lootBoxes = []; ammoBoxes = []; particles = []; floatingTexts = [];
    isShooting = false; keys.w = keys.a = keys.s = keys.d = false;
    leftJoy.active = false; rightJoy.active = false;
    globalTime = 0; bossAlarmTimer = 0; scoreSubmitted = false;
    
    document.getElementById('submit-form').style.display = 'none';
    
    monsterQueue = []; TOTAL_MONSTERS = 0; monstersLeft = [0, 0, 0, 0, 0, 0];
    MONSTER_BASE.forEach(m => {
        for(let i=0; i<m.count; i++) monsterQueue.push({...m});
        TOTAL_MONSTERS += m.count; monstersLeft[m.tier] += m.count; 
    });
    
    fetchLeaderboard();
    gameState = 'PLAYING';
    spawnLootBox();
}

// ==========================================
// 🧠 答題邏輯
// ==========================================

function triggerMath(type) {
    currentMathType = type;
    gameState = 'MATH_TIME';
    isShooting = false; rightJoy.active = false; leftJoy.active = false; keys.w=keys.a=keys.s=keys.d=false;
    
    let headerEl = document.getElementById('math-header');
    let containerEl = document.getElementById('math-container');
    headerEl.textContent = type === 'UPGRADE' ? '⚡ 武器進化程序 ⚡' : '🔵 彈藥補給程序 🔵';
    headerEl.style.color = type === 'UPGRADE' ? '#eab308' : '#38bdf8';
    containerEl.style.borderColor = headerEl.style.color;

    let qLevel = currentDifficulty === 'S3' ? '3' : (currentDifficulty === 'S2' ? '2' : '1');
    let qData;

    if (typeof generateIndicesQuestions === 'function') {
        try { qData = generateIndicesQuestions(1, qLevel)[0]; } catch(e) { qData = generateFallbackMCQ(); }
    } else { qData = generateFallbackMCQ(); }

    document.getElementById('math-question-content').innerHTML = qData.question;
    const optsContainer = document.getElementById('math-options-container');
    optsContainer.innerHTML = '';
    
    if(qData.options) {
        qData.options.forEach(opt => {
            let btn = document.createElement('div'); btn.className = 'mcq-btn';
            btn.innerHTML = `<span class="mcq-label">${opt.id}.</span> <span>${opt.text}</span>`;
            btn.onclick = () => submitMCQ(opt.isCorrect);
            optsContainer.appendChild(btn);
        });
    }

    if (typeof MathJax !== 'undefined') MathJax.typesetPromise([document.getElementById('math-overlay')]);
    document.getElementById('math-overlay').style.display = 'flex';
    mathTimer = 600; 
}

function generateFallbackMCQ() {
    let num1 = getRandomInt(5, 20); let num2 = getRandomInt(5, 20); let ans = num1 + num2;
    let opts = [{text:`\\( ${ans} \\)`, isCorrect:true}, {text:`\\( ${ans+1} \\)`, isCorrect:false}, {text:`\\( ${ans-1} \\)`, isCorrect:false}, {text:`\\( ${ans+2} \\)`, isCorrect:false}];
    return { 
        question: `<div style="font-size:16px;color:#cbd5e1;margin-bottom:10px;">請計算以下結果：</div><div style="font-size:28px;font-weight:bold;">\\( \\displaystyle ${num1} + ${num2} = ? \\)</div>`, 
        options: shuffleArray(opts).map((o,i)=>({...o, id: String.fromCharCode(65+i)})) 
    };
}

window.submitMCQ = function(isCorrect) {
    if (isCorrect) {
        if (currentMathType === 'UPGRADE') {
            if (player.weaponLevel === -1) {
                player.weaponLevel = 0; player.speed = WEAPONS[0].playerSpeed;
                player.currentMagazine = WEAPONS[0].magCapacity; player.totalAmmo += WEAPONS[0].reloadAmmo;
            } else if (player.weaponLevel < WEAPONS.length - 1) {
                player.weaponLevel++; player.speed = WEAPONS[player.weaponLevel].playerSpeed;
                player.totalAmmo += WEAPONS[player.weaponLevel].reloadAmmo;
            } else {
                player.totalAmmo += WEAPONS[player.weaponLevel].reloadAmmo;
            }
            player.hp = Math.min(player.maxHp, player.hp + 50); 
            createParticles(player.x, player.y, '#4ade80', 60, 10); 
        } else {
            let ammoToAdd = (player.weaponLevel >= 0) ? WEAPONS[player.weaponLevel].ammoBoxRefill || 30 : 30;
            player.totalAmmo += ammoToAdd;
            createParticles(player.x, player.y, '#38bdf8', 50, 10); 
        }
        closeMathOverlay(true);
    } else {
        closeMathOverlay(false);
    }
}

function closeMathOverlay(success) {
    document.getElementById('math-overlay').style.display = 'none';
    shakeTime = success ? 0 : 15;
    gameState = 'PLAYING'; isShooting = false;
}

canvas.addEventListener('touchstart', (e) => {
    if(e.target !== canvas) return; e.preventDefault(); initAudio();
    if (gameState === 'GAME_OVER' || gameState === 'VICTORY') {
        if (scoreSubmitted || document.getElementById('submit-form').style.display === 'none') resetGame();
        return;
    }
    if (gameState === 'PLAYING') {
        for(let t of e.changedTouches) {
            if (t.clientX > UI_BOUND && t.clientX < canvas.width / 2 && !leftJoy.active) {
                leftJoy.active = true; leftJoy.id = t.identifier; updateFixedJoystick(leftJoy, t.clientX, t.clientY);
            } else if (t.clientX >= canvas.width / 2 && !rightJoy.active) {
                rightJoy.active = true; rightJoy.id = t.identifier;
                rightJoy.base = {x: t.clientX, y: t.clientY}; rightJoy.stick = {x: t.clientX, y: t.clientY};
                player.angle = Math.atan2(0, 1);
            }
        }
    }
}, {passive: false});

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    for(let t of e.changedTouches) {
        if (leftJoy.active && t.identifier === leftJoy.id) updateFixedJoystick(leftJoy, Math.max(UI_BOUND, t.clientX), t.clientY); 
        if (rightJoy.active && t.identifier === rightJoy.id) {
            let dx = t.clientX - rightJoy.base.x; let dy = t.clientY - rightJoy.base.y; let dist = Math.sqrt(dx*dx + dy*dy);
            rightJoy.angle = Math.atan2(dy, dx) || 0;
            if (dist > joyRadius) {
                rightJoy.stick.x = rightJoy.base.x + Math.cos(rightJoy.angle) * joyRadius; rightJoy.stick.y = rightJoy.base.y + Math.sin(rightJoy.angle) * joyRadius;
            } else { rightJoy.stick.x = t.clientX; rightJoy.stick.y = t.clientY; }
            player.angle = rightJoy.angle;
        }
    }
}, {passive: false});

canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    for(let t of e.changedTouches) {
        if (leftJoy.active && t.identifier === leftJoy.id) { leftJoy.active = false; leftJoy.stick = {x: leftJoyBase.x, y: leftJoyBase.y}; }
        if (rightJoy.active && t.identifier === rightJoy.id) rightJoy.active = false; 
    }
}, {passive: false});

function updateFixedJoystick(joy, tx, ty) {
    let dx = tx - leftJoyBase.x; let dy = ty - leftJoyBase.y; let dist = Math.sqrt(dx*dx + dy*dy); let angle = Math.atan2(dy, dx);
    if (dist > joyRadius) {
        joy.stick.x = leftJoyBase.x + Math.cos(angle) * joyRadius; joy.stick.y = leftJoyBase.y + Math.sin(angle) * joyRadius;
    } else { joy.stick.x = tx; joy.stick.y = ty; }
    joy.dir = {x: dx/joyRadius, y: dy/joyRadius};
}

window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
window.addEventListener('mousedown', (e) => {
    if(e.target !== canvas) return; initAudio();
    if (gameState === 'GAME_OVER' || gameState === 'VICTORY') {
        if (scoreSubmitted || document.getElementById('submit-form').style.display === 'none') resetGame(); 
    } else if (gameState === 'PLAYING') isShooting = true;
});
window.addEventListener('mouseup', () => { isShooting = false; });
window.addEventListener('keydown', (e) => {
    initAudio();
    if (gameState === 'PLAYING') { let key = e.key.toLowerCase(); if (keys.hasOwnProperty(key)) keys[key] = true; } 
    else if (gameState === 'GAME_OVER' || gameState === 'VICTORY') { if (e.key === 'Enter') resetGame(); }
});
window.addEventListener('keyup', (e) => { if (gameState === 'PLAYING') { let key = e.key.toLowerCase(); if (keys.hasOwnProperty(key)) keys[key] = false; }});

function spawnLootBox() { lootBoxes.push({ x: Math.random()*(canvas.width-UI_BOUND-100)+UI_BOUND+50, y: Math.random()*(canvas.height-200)+100, size: 35, pulse: 0, spawnTime: globalTime }); }
function spawnAmmoBox() { if (ammoBoxes.length < 3) ammoBoxes.push({ x: Math.random()*(canvas.width-UI_BOUND-100)+UI_BOUND+50, y: Math.random()*(canvas.height-200)+100, size: 28, pulse: 0, spawnTime: globalTime }); }
function fireBullet(angle, w, s) { bullets.push({ x: player.x+Math.cos(player.angle)*30, y: player.y+Math.sin(player.angle)*30, vx: Math.cos(angle)*s, vy: Math.sin(angle)*s, radius: w.size||4, color: w.color, glow: w.glow, damage: w.damage, penetrate: w.penetrate, hitEnemies: [] }); }
function createParticles(x, y, color, count, speedStr=5) { for(let i=0; i<count; i++) particles.push({x, y, vx:(Math.random()-0.5)*speedStr, vy:(Math.random()-0.5)*speedStr, life:1.0, decay:0.02+Math.random()*0.04, color, size:2+Math.random()*4}); }
function checkCollision(obj1, obj2, dist) { return Math.hypot(obj1.x-obj2.x, obj1.y-obj2.y) <= dist; }

function update() {
    globalTime++; updateHTMLHUD();
    if (gameState === 'START_MENU') return;

    if (gameState === 'MATH_TIME') {
        mathTimer--;
        if (uiElements.mathTimerBar) {
            uiElements.mathTimerBar.style.width = (mathTimer/600*100)+'%';
            uiElements.mathTimerBar.style.backgroundColor = mathTimer < 180 ? '#ef4444' : '#4ade80';
        }
        if (mathTimer <= 0) closeMathOverlay(false);
    }
    if (gameState !== 'PLAYING') return;

    if (player.recoilOffset > 0) player.recoilOffset *= 0.8; 
    if (bossAlarmTimer > 0) bossAlarmTimer--;

    for (let i=particles.length-1; i>=0; i--) {
        particles[i].x += particles[i].vx; particles[i].y += particles[i].vy; particles[i].life -= particles[i].decay;
        if (particles[i].life <= 0) particles.splice(i, 1);
    }

    if (player.isReloading && player.weaponLevel >= 0) {
        player.reloadTimer--;
        if (player.reloadTimer <= 0) {
            let take = Math.min(WEAPONS[player.weaponLevel].magCapacity - player.currentMagazine, player.totalAmmo);
            player.currentMagazine += take; player.totalAmmo -= take; player.isReloading = false;
        }
    }

    if (player.weaponLevel >= 0 && globalTime % ammoBoxSpawnInterval === 0) spawnAmmoBox(); 
    if (globalTime % lootBoxSpawnInterval === 0) spawnLootBox(); 
    if (monsterQueue.length > 0 && (enemies.length < 4 || globalTime % 180 === 0)) {
        let m = monsterQueue.shift(); totalMonstersSpawned++;
        enemies.push({...m, x: Math.random()<0.5?UI_BOUND-50:canvas.width+50, y: Math.random()*canvas.height, maxHp: m.hp, bobPhase: Math.random()*Math.PI*2});
    }

    let spd = player.speed || 4; 
    let dx = leftJoy.active ? leftJoy.dir.x * spd : (keys.d ? spd : (keys.a ? -spd : 0));
    let dy = leftJoy.active ? leftJoy.dir.y * spd : (keys.s ? spd : (keys.w ? -spd : 0));
    
    player.isMoving = (dx !== 0 || dy !== 0);
    if (dx !== 0 && dy !== 0 && !leftJoy.active) { let len = Math.sqrt(dx*dx+dy*dy); dx = (dx/len)*spd; dy = (dy/len)*spd; }
    player.x = Math.max(UI_BOUND + player.radius, Math.min(canvas.width - player.radius, player.x + dx));
    player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y + dy));

    if (rightJoy.active) player.angle = rightJoy.angle;
    else if (!('ontouchstart' in window)) player.angle = Math.atan2(mouseY - player.y, mouseX - player.x);

    if ((isShooting || rightJoy.active) && player.weaponLevel >= 0) {
        const w = WEAPONS[player.weaponLevel];
        if (globalTime - player.lastFireTime >= w.fireRate) {
            if (player.currentMagazine > 0 && !player.isReloading) {
                let sfx = document.getElementById('shootSfx'); if(sfx) { sfx.currentTime=0; sfx.play().catch(()=>{}); }
                player.currentMagazine--; 
                for(let k=0; k<w.bullets; k++) fireBullet(player.angle + (Math.random()-0.5)*0.05, w, w.speed - k*2);
                createParticles(player.x + Math.cos(player.angle)*30, player.y + Math.sin(player.angle)*30, w.color, w.level*2, w.level*1.5);
                shakeTime = 2; player.recoilOffset = w.recoil; player.lastFireTime = globalTime;
            } else if (player.currentMagazine <= 0 && player.totalAmmo > 0 && !player.isReloading) {
                player.isReloading = true; player.reloadTimer = 30; 
                let rSfx = document.getElementById('reloadSfx'); if(rSfx) { rSfx.currentTime=0; rSfx.play().catch(()=>{}); }
            }
        }
    }

    for (let i=bullets.length-1; i>=0; i--) {
        let b = bullets[i]; b.x += b.vx; b.y += b.vy;
        if (Math.random() < 0.3) createParticles(b.x, b.y, b.color, 1, 1);
        if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
    }

    for (let i=enemies.length-1; i>=0; i--) {
        let e = enemies[i];
        e.angle = Math.atan2(player.y - e.y, player.x - e.x);
        e.x += Math.cos(e.angle) * e.speed; e.y += Math.sin(e.angle) * e.speed;

        if (checkCollision(player, e, player.radius + e.size/2)) {
            player.hp -= (10 + e.tier*5); shakeTime = 10;
            createParticles(player.x, player.y, '#ef4444', 30, 8); 
            e.x -= Math.cos(e.angle)*40; e.y -= Math.sin(e.angle)*40;
            if (player.hp <= 0) { gameState='GAME_OVER'; document.getElementById('submit-form').style.display = 'flex'; scoreSubmitted=false; }
            continue;
        }

        for (let j=bullets.length-1; j>=0; j--) {
            let b = bullets[j];
            if (b.penetrate && b.hitEnemies.includes(e)) continue;

            if (checkCollision(e, b, e.size/2 + b.radius)) {
                e.hp -= b.damage; createParticles(e.x, e.y, b.color, 6, 5); 
                if (b.penetrate) b.hitEnemies.push(e); else bullets.splice(j, 1); 

                if (e.hp <= 0) {
                    createParticles(e.x, e.y, e.color, e.tier===5?100:40, 8); 
                    monstersLeft[e.tier]--; enemies.splice(i, 1); enemiesKilled++;
                    if (enemiesKilled >= TOTAL_MONSTERS) { gameState='VICTORY'; document.getElementById('submit-form').style.display='flex'; scoreSubmitted=false; }
                    break; 
                }
            }
        }
    }

    [lootBoxes, ammoBoxes].forEach(list => {
        for (let i=list.length-1; i>=0; i--) {
            if (globalTime - list[i].spawnTime > 600) { createParticles(list[i].x, list[i].y, '#94a3b8', 25, 5); list.splice(i, 1); continue; }
            list[i].pulse += 0.1;
            if (checkCollision(player, list[i], player.radius + list[i].size/2)) {
                createParticles(list[i].x, list[i].y, list===lootBoxes?'#eab308':'#38bdf8', 40, 8);
                let type = list===lootBoxes?'UPGRADE':'AMMO';
                list.splice(i, 1); triggerMath(type); break;
            }
        }
    });
}

function draw() {
    if (gameState === 'START_MENU') return;

    ctx.fillStyle = '#d2b48c'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    if (shakeTime > 0) { let mag = (shakeTime/10)*8; ctx.translate((Math.random()-0.5)*mag, (Math.random()-0.5)*mag); shakeTime--; }

    ctx.strokeStyle = 'rgba(139, 69, 19, 0.15)'; ctx.lineWidth = 2;
    for(let i=0; i<canvas.width; i+=80) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
    for(let i=0; i<canvas.height; i+=80) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }

    if (bossAlarmTimer > 0) {
        ctx.fillStyle = `rgba(220, 38, 38, ${Math.abs(Math.sin(bossAlarmTimer*0.1))*0.4})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // --- 繪製順序 (Y軸排序) ---
    let drawables = [];
    if (player.hp > 0) drawables.push({ type: 'player', y: player.y, obj: player });
    for (let e of enemies) drawables.push({ type: 'enemy', y: e.y, obj: e });
    for (let b of lootBoxes) drawables.push({ type: 'box', y: b.y, obj: b });
    for (let a of ammoBoxes) drawables.push({ type: 'ammoBox', y: a.y, obj: a });
    drawables.sort((a, b) => a.y - b.y);

    for (let item of drawables) {
        if (item.type === 'box' || item.type === 'ammoBox') {
            let box = item.obj; let isLoot = item.type === 'box';
            let glow = Math.abs(Math.sin(box.pulse)) * 8; let timeLeft = 600 - (globalTime - box.spawnTime);
            if (timeLeft < 180 && globalTime % 20 < 10) ctx.globalAlpha = 0.4;
            
            ctx.save(); ctx.translate(box.x, box.y);
            // 光暈
            ctx.shadowBlur = 20 + glow; ctx.shadowColor = isLoot ? '#eab308' : '#38bdf8';
            ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(0, 0, 24, 12, 0, 0, Math.PI*2); ctx.fill();
            
            let visualY = -15 - glow;
            ctx.fillStyle = isLoot ? '#78350f' : '#1e3a8a'; ctx.fillRect(-20, visualY - 15, 40, 30);
            ctx.fillStyle = isLoot ? '#f59e0b' : '#3b82f6'; ctx.fillRect(-22, visualY - 23, 44, 15);
            ctx.fillStyle = isLoot ? '#fbbf24' : '#60a5fa'; ctx.fillRect(-5, visualY - 10, 10, 10);
            ctx.shadowBlur = 0; // 重置陰影避免影響字體
            
            ctx.fillStyle = 'white'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center'; 
            ctx.fillText(isLoot ? 'UP' : 'AMMO', 0, visualY - 30);
            ctx.strokeStyle = 'white'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(0, visualY - 50, 10, -Math.PI/2, -Math.PI/2 + (timeLeft/600)*Math.PI*2); ctx.stroke();
            ctx.restore(); ctx.globalAlpha = 1.0;
        } 
        else if (item.type === 'enemy') {
            let e = item.obj; let isFacingRight = player.x > e.x; let bob = Math.abs(Math.sin(globalTime*0.1*e.speed + e.bobPhase)) * (e.size*0.15);
            ctx.save(); ctx.translate(e.x, e.y); 
            ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0, 0, e.size*0.5, e.size*0.2, 0, 0, Math.PI*2); ctx.fill();
            
            let visualY = -10 - bob;
            
            // 怪物詳細繪製 (還原精緻多邊形/層次)
            ctx.fillStyle = e.color; ctx.beginPath();
            ctx.arc(0, visualY - e.size*0.4, e.size*0.45, Math.PI, 0); 
            ctx.lineTo(e.size*0.45, visualY + e.size*0.1); ctx.lineTo(-e.size*0.45, visualY + e.size*0.1); ctx.fill();
            
            if (e.tier <= 2) {
                ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(-e.size*0.4, visualY - e.size*0.1); ctx.lineTo(e.size*0.4, visualY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-e.size*0.4, visualY - e.size*0.3); ctx.lineTo(e.size*0.4, visualY - e.size*0.2); ctx.stroke();
            } else if (e.tier === 4) {
                ctx.fillStyle = '#bef264'; ctx.beginPath(); ctx.arc(-e.size*0.2, visualY - e.size*0.1, e.size*0.1, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(e.size*0.25, visualY - e.size*0.3, e.size*0.08, 0, Math.PI*2); ctx.fill();
            } else if (e.tier === 5) {
                ctx.fillStyle = '#334155';
                ctx.beginPath(); ctx.moveTo(-e.size*0.2, visualY - e.size*0.4); ctx.lineTo(-e.size*0.5, visualY - e.size*0.7); ctx.lineTo(-e.size*0.3, visualY - e.size*0.3); ctx.fill();
                ctx.beginPath(); ctx.moveTo(e.size*0.2, visualY - e.size*0.4); ctx.lineTo(e.size*0.5, visualY - e.size*0.7); ctx.lineTo(e.size*0.3, visualY - e.size*0.3); ctx.fill();
                ctx.fillStyle = '#fbbf24'; ctx.beginPath(); ctx.moveTo(-20, visualY - e.size*0.4); ctx.lineTo(-25, visualY - e.size*0.6); ctx.lineTo(0, visualY - e.size*0.5); ctx.lineTo(25, visualY - e.size*0.6); ctx.lineTo(20, visualY - e.size*0.4); ctx.fill();
            }
            ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.stroke();
            
            // 眼睛
            let eyeOffsetX = isFacingRight ? e.size*0.15 : -e.size*0.15;
            ctx.fillStyle = e.tier >= 3 ? '#ef4444' : 'white';
            ctx.beginPath(); ctx.arc(eyeOffsetX - e.size*0.15, visualY - e.size*0.3, e.size*0.08, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(eyeOffsetX + e.size*0.15, visualY - e.size*0.3, e.size*0.08, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'black'; 
            ctx.beginPath(); ctx.arc(eyeOffsetX - e.size*0.15 + (isFacingRight?1:-1), visualY - e.size*0.3, e.size*0.04, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(eyeOffsetX + e.size*0.15 + (isFacingRight?1:-1), visualY - e.size*0.3, e.size*0.04, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = 'white'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center'; ctx.fillText(`Lv.${e.tier}`, 0, visualY - e.size*0.9 - 10);
            let hpBarWidth = e.tier === 5 ? 80 : 40; ctx.fillStyle = '#334155'; ctx.fillRect(-hpBarWidth/2, visualY - e.size*0.7 - 15, hpBarWidth, 6);
            ctx.fillStyle = '#ef4444'; ctx.fillRect(-hpBarWidth/2, visualY - e.size*0.7 - 15, hpBarWidth * (e.hp / e.maxHp), 6);
            ctx.restore();
        }
        else if (item.type === 'player') {
            let p = item.obj; let isFacingRight = (rightJoy.active) ? (Math.abs(rightJoy.angle) < Math.PI/2) : (mouseX > p.x); let bob = p.isMoving ? Math.sin(globalTime * 0.5) * 4 : 0;
            ctx.save(); ctx.translate(p.x, p.y);
            ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0, 0, p.radius*1.2, p.radius*0.5, 0, 0, Math.PI*2); ctx.fill();
            
            let visualY = -10 + bob; 
            
            let gunDrawLogic = () => {
                if (player.weaponLevel === -1) return;
                let wepColor = WEAPONS[player.weaponLevel] ? WEAPONS[player.weaponLevel].color : '#fff';
                ctx.save(); ctx.translate(0, visualY - 5); ctx.rotate(p.angle || 0);
                if (Math.abs(p.angle) > Math.PI/2) ctx.scale(1, -1);
                ctx.fillStyle = '#1e293b'; ctx.fillRect(0 - p.recoilOffset, -4, 25, 8); 
                ctx.fillStyle = '#475569'; ctx.fillRect(10 - p.recoilOffset, -2, 15, 4); 
                ctx.shadowBlur = 10; ctx.shadowColor = wepColor; ctx.fillStyle = wepColor; ctx.fillRect(25 - p.recoilOffset, -3, 6, 6); 
                ctx.shadowBlur = 0; ctx.restore();
            };
            
            let aimUp = Math.sin(p.angle || 0) < 0; 
            if (aimUp) gunDrawLogic();
            
            // 勇士披風 (紅色)
            ctx.fillStyle = '#dc2626'; ctx.beginPath(); ctx.moveTo(-12, visualY - 10); ctx.lineTo(-20, visualY + 20); ctx.lineTo(20, visualY + 20); ctx.lineTo(12, visualY - 10); ctx.fill();
            
            let legSwing = p.isMoving ? Math.sin(globalTime * 0.8) * 8 : 0;
            ctx.fillStyle = '#475569'; ctx.fillRect(-8, visualY + 15 - legSwing, 6, 12); ctx.fillRect(2, visualY + 15 + legSwing, 6, 12);
            
            // 戰服與胸甲 (藍銀色)
            ctx.fillStyle = '#1d4ed8'; ctx.fillRect(-12, visualY - 15, 24, 30); 
            ctx.fillStyle = '#94a3b8'; ctx.fillRect(-14, visualY - 15, 28, 16); 
            
            // 臉與頭盔
            ctx.fillStyle = '#fcd34d'; ctx.beginPath(); ctx.arc(0, visualY - 25, 16, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#cbd5e1'; ctx.beginPath(); ctx.arc(0, visualY - 28, 17, Math.PI, 0); ctx.fill(); ctx.fillRect(-18, visualY - 28, 36, 6); 
            ctx.fillStyle = '#b91c1c'; ctx.fillRect(-3, visualY - 48, 6, 12); // 紅纓
            
            let eyeX = Math.cos(p.angle || 0) * 3; let eyeY = Math.sin(p.angle || 0) * 3;
            ctx.fillStyle = '#1e293b'; ctx.beginPath(); ctx.arc(-5 + eyeX, visualY - 23 + eyeY, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(5 + eyeX, visualY - 23 + eyeY, 3, 0, Math.PI*2); ctx.fill();
            
            // 握槍的手
            if (player.weaponLevel >= 0) { ctx.fillStyle = '#fcd34d'; ctx.beginPath(); ctx.arc(Math.cos(p.angle || 0)*10 - p.recoilOffset, visualY - 5 + Math.sin(p.angle || 0)*10, 5, 0, Math.PI*2); ctx.fill(); }
            
            if (!aimUp) gunDrawLogic(); 
            ctx.restore();
        }
    }

    // 發光子彈
    for (let b of bullets) {
        ctx.save(); ctx.translate(b.x, b.y - 15); ctx.rotate(Math.atan2(b.vy, b.vx)); 
        ctx.shadowBlur = 10; ctx.shadowColor = b.glow;
        ctx.fillStyle = b.color; ctx.beginPath(); ctx.roundRect(-10, -b.radius/2, 20 + b.radius*2, b.radius, 5); ctx.fill();
        ctx.restore();
    }
    
    for (let p of particles) { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); }
    ctx.globalAlpha = 1.0;
    
    if (gameState === 'PLAYING' && ('ontouchstart' in window)) {
        const drawJoy = (joy, base) => {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)'; ctx.beginPath(); ctx.arc(base.x, base.y, joyRadius, 0, Math.PI*2); ctx.fill();
            ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)'; ctx.stroke();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)'; ctx.beginPath(); ctx.arc(joy.stick.x, joy.stick.y, joyRadius/2.5, 0, Math.PI*2); ctx.fill();
        };
        drawJoy(leftJoy, leftJoyBase); 
        if (rightJoy.active) drawJoy(rightJoy, rightJoy.base);
    }

    let gameCenterX = UI_BOUND + (canvas.width - UI_BOUND) / 2;

    if (gameState === 'GAME_OVER' || gameState === 'VICTORY') {
        ctx.fillStyle = 'rgba(15, 23, 42, 0.9)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.textAlign = 'center';
        if (gameState === 'VICTORY') {
            ctx.fillStyle = '#fbbf24'; ctx.font = 'bold 60px Arial'; ctx.shadowBlur=20; ctx.shadowColor='#eab308'; ctx.fillText('MISSION ACCOMPLISHED!', gameCenterX, canvas.height/2 - 80);
            ctx.fillStyle = 'white'; ctx.font = 'bold 24px Arial'; ctx.shadowBlur=0;
            let finalWepName = player.weaponLevel >= 0 ? WEAPONS[player.weaponLevel].name : '無';
            ctx.fillText(`成功擊殺終極 Boss！ 最終武器: ${finalWepName}`, gameCenterX, canvas.height/2 - 10);
        } else {
            ctx.fillStyle = '#ef4444'; ctx.font = 'bold 80px Arial'; ctx.shadowBlur=20; ctx.shadowColor='#ef4444'; ctx.fillText('YOU DIED', gameCenterX, canvas.height/2 - 80);
            ctx.fillStyle = 'white'; ctx.font = 'bold 28px Arial'; ctx.shadowBlur=0;
            ctx.fillText(`擊殺數: ${enemiesKilled} / ${TOTAL_MONSTERS}`, gameCenterX, canvas.height/2 - 10);
        }
        ctx.globalAlpha = (globalTime % 60 < 30) ? 1 : 0.5; ctx.fillStyle = '#94a3b8'; ctx.font = '24px Arial';
        ctx.fillText('<< 請在左下方輸入資料上傳排行榜 >>', gameCenterX, canvas.height/2 + 60); 
        ctx.fillText('或按 [Enter] 重玩', gameCenterX, canvas.height/2 + 100); ctx.globalAlpha = 1.0;
    }
    ctx.restore();
}

// ==========================================
// 🚀 非阻塞核心啟動 (保證不卡畫面)
// ==========================================
async function loadGameData() {
    const loader = document.getElementById('loading-screen');
    const menu = document.getElementById('start-menu');
    if (loader) loader.style.display = 'none';
    if (menu) menu.style.display = 'flex';
    gameState = 'START_MENU';

    // 背景默默獲取數據，不卡死玩家
    if (GAS_WEB_APP_URL) {
        fetch(`${GAS_WEB_APP_URL}?t=${Date.now()}`)
            .then(res => res.json())
            .then(data => {
                if (data.weapons && data.weapons.length > 1) {
                    let rows = data.weapons;
                    for(let i=1; i<rows.length; i++) {
                        if (rows[i].length >= 7 && WEAPONS[i-1]) {
                            WEAPONS[i-1].name = String(rows[i][1]).trim() || WEAPONS[i-1].name;
                            WEAPONS[i-1].damage = parseFloat(rows[i][2]) || WEAPONS[i-1].damage;
                            WEAPONS[i-1].bullets = parseInt(rows[i][3]) || WEAPONS[i-1].bullets;
                            WEAPONS[i-1].fireRate = parseInt(rows[i][4]) || WEAPONS[i-1].fireRate;
                        }
                    }
                }
                if (data.monsters && data.monsters.length > 1) {
                    let rows = data.monsters;
                    for(let i=1; i<rows.length; i++) {
                        if (rows[i].length >= 5 && MONSTER_BASE[i-1]) {
                            MONSTER_BASE[i-1].hp = parseFloat(rows[i][3]) || MONSTER_BASE[i-1].hp;
                            MONSTER_BASE[i-1].speed = parseFloat(rows[i][4]) || MONSTER_BASE[i-1].speed;
                        }
                    }
                }
                console.log("雲端數值同步完成");
            }).catch(e => console.warn("使用本地數值"));
    }
    gameLoop(); 
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
loadGameData();
</script>
